server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
spring:
  application:
    name: account-service
  lifecycle:
    timeout-per-shutdown-phase: 20s
  datasource:
    url: ${ACCOUNT_DB_URL:jdbc:h2:mem:accounts;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${ACCOUNT_DB_USERNAME:sa}
    password: ${ACCOUNT_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  mvc:
    problemdetails:
      enabled: true
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
logging:
  config: classpath:logback-spring.xml
