services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    image: eventledger/account-service:1.0.0
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8081
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    ports: ["8081:8081"]
    volumes:
      - account-data:/data
    networks: [event-ledger]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    image: eventledger/event-gateway:1.0.0
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    ports: ["8080:8080"]
    volumes:
      - event-data:/data
    networks: [event-ledger]
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  event-ledger:
    driver: bridge
volumes:
  account-data:
  event-data:
